<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevRamp - Course Generator Debug</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #8b949e;
            margin-bottom: 2rem;
        }

        /* Form */
        .form-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: #c9d1d9;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #58a6ff;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: #238636;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2ea043;
        }

        button:disabled {
            background: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }

        /* Progress */
        .progress-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .progress-section.visible {
            display: block;
        }

        .progress-title {
            color: #58a6ff;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .step-list {
            list-style: none;
        }

        .step {
            display: flex;
            align-items: center;
            padding: 0.5rem 0;
            color: #8b949e;
        }

        .step.completed {
            color: #3fb950;
        }

        .step.current {
            color: #58a6ff;
        }

        .step.failed {
            color: #f85149;
        }

        .step-icon {
            width: 24px;
            height: 24px;
            margin-right: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .step.completed .step-icon::before {
            content: "✓";
            color: #3fb950;
            font-weight: bold;
        }

        .step.current .step-icon::before {
            content: "";
            width: 16px;
            height: 16px;
            border: 2px solid #58a6ff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .step.pending .step-icon::before {
            content: "○";
            color: #30363d;
        }

        .step.failed .step-icon::before {
            content: "✗";
            color: #f85149;
            font-weight: bold;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #2d1f1f;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
        }

        /* Course Display */
        .course-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            display: none;
        }

        .course-section.visible {
            display: block;
        }

        .course-header {
            border-bottom: 1px solid #30363d;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .course-title {
            color: #58a6ff;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .course-meta {
            display: flex;
            gap: 1.5rem;
            color: #8b949e;
            font-size: 0.9rem;
        }

        .course-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .module-list {
            list-style: none;
        }

        .module {
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .module-header {
            padding: 1rem;
            background: #0d1117;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-header:hover {
            background: #161b22;
        }

        .module-title {
            font-weight: 500;
        }

        .module-level {
            font-size: 0.75rem;
            background: #21262d;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: #8b949e;
        }

        .module-content {
            display: none;
            padding: 1rem;
            border-top: 1px solid #30363d;
        }

        .module.expanded .module-content {
            display: block;
        }

        .section {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            background: #0d1117;
        }

        .section-title {
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .section-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            margin-left: 0.5rem;
        }

        .section-type.reading {
            background: #1f3d2a;
            color: #3fb950;
        }

        .section-type.exercise {
            background: #2d2a1f;
            color: #d29922;
        }

        .section-body {
            font-size: 0.9rem;
            color: #8b949e;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Code blocks in content */
        .section-body code {
            background: #161b22;
            padding: 0.15rem 0.3rem;
            border-radius: 3px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.85em;
        }

        .section-body pre {
            background: #161b22;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .section-body pre code {
            background: none;
            padding: 0;
        }

        /* History */
        .history-section {
            margin-top: 2rem;
        }

        .history-title {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 0.75rem;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .history-item:hover {
            border-color: #58a6ff;
        }

        .history-item-title {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .history-item-meta {
            font-size: 0.8rem;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DevRamp Course Generator</h1>
        <p class="subtitle">Debug UI - Generate learning courses from GitHub repos</p>

        <!-- Input Form -->
        <div class="form-section">
            <label for="github-url">GitHub Repository URL</label>
            <input type="text" id="github-url" placeholder="https://github.com/username/repo">

            <label for="intent">What do you need to learn?</label>
            <textarea id="intent" placeholder="I'm a backend dev joining the team. I need to understand the authentication flow because I'll be adding OAuth support."></textarea>

            <button id="generate-btn" onclick="startGeneration()">Generate Course</button>
        </div>

        <!-- Progress -->
        <div class="progress-section" id="progress-section">
            <div class="progress-title">Generating Course...</div>
            <ul class="step-list" id="step-list"></ul>
            <div class="error-message" id="error-message" style="display: none;"></div>
        </div>

        <!-- Course Display -->
        <div class="course-section" id="course-section">
            <div class="course-header">
                <h2 class="course-title" id="course-title"></h2>
                <div class="course-meta">
                    <span id="course-hours"></span>
                    <span id="course-modules"></span>
                    <span id="course-readings"></span>
                    <span id="course-exercises"></span>
                </div>
            </div>
            <ul class="module-list" id="module-list"></ul>
        </div>

        <!-- History -->
        <div class="history-section">
            <div class="history-title">Recent Courses</div>
            <ul class="history-list" id="history-list"></ul>
        </div>
    </div>

    <script>
        const API_BASE = '';  // Same origin
        let currentJobId = null;
        let pollInterval = null;

        // Load history on page load
        document.addEventListener('DOMContentLoaded', loadHistory);

        async function startGeneration() {
            const githubUrl = document.getElementById('github-url').value.trim();
            const intent = document.getElementById('intent').value.trim();

            if (!githubUrl || !intent) {
                alert('Please enter both GitHub URL and learning intent');
                return;
            }

            // Disable button
            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.textContent = 'Starting...';

            // Show progress
            document.getElementById('progress-section').classList.add('visible');
            document.getElementById('course-section').classList.remove('visible');
            document.getElementById('error-message').style.display = 'none';

            try {
                // Check if repo is already ingested
                const repoName = githubUrl.split('/').pop().replace('.git', '');
                let endpoint = '/pipeline/start';
                let body = { github_url: githubUrl, intent };

                try {
                    const repoCheck = await fetch(`http://localhost:8000/repos/${repoName}`);
                    if (repoCheck.ok) {
                        // Repo exists, just generate
                        endpoint = '/generate/start';
                        body = { repo_name: repoName, intent };
                    }
                } catch (e) {
                    // Cortex not reachable or repo not found, use full pipeline
                }

                const response = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                const data = await response.json();
                currentJobId = data.job_id;

                // Start polling
                pollInterval = setInterval(pollJobStatus, 1000);

            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Generate Course';
            }
        }

        async function pollJobStatus() {
            if (!currentJobId) return;

            try {
                const response = await fetch(`${API_BASE}/jobs/${currentJobId}`);
                const job = await response.json();

                // Update step list
                renderSteps(job.steps);

                if (job.status === 'completed') {
                    clearInterval(pollInterval);
                    document.getElementById('generate-btn').disabled = false;
                    document.getElementById('generate-btn').textContent = 'Generate Course';

                    // Load and display course
                    if (job.course_id) {
                        await loadCourse(job.course_id);
                    }
                    loadHistory();

                } else if (job.status === 'failed') {
                    clearInterval(pollInterval);
                    document.getElementById('generate-btn').disabled = false;
                    document.getElementById('generate-btn').textContent = 'Generate Course';
                    showError(job.error || 'Generation failed');
                }

            } catch (error) {
                console.error('Poll error:', error);
            }
        }

        function renderSteps(steps) {
            const list = document.getElementById('step-list');
            list.innerHTML = steps.map(step => {
                let className = 'step';
                if (step.completed) className += ' completed';
                else if (step.current) className += ' current';
                else className += ' pending';

                return `
                    <li class="${className}">
                        <span class="step-icon"></span>
                        <span>${step.label}</span>
                    </li>
                `;
            }).join('');
        }

        function showError(message) {
            const el = document.getElementById('error-message');
            el.textContent = message;
            el.style.display = 'block';
        }

        async function loadCourse(courseId) {
            try {
                const response = await fetch(`${API_BASE}/courses/${courseId}`);
                const course = await response.json();

                document.getElementById('course-section').classList.add('visible');
                document.getElementById('course-title').textContent = course.title;
                document.getElementById('course-hours').textContent = `${course.estimated_hours.toFixed(1)} hours`;
                document.getElementById('course-modules').textContent = `${course.modules.length} modules`;
                document.getElementById('course-readings').textContent = `${course.total_readings} readings`;
                document.getElementById('course-exercises').textContent = `${course.total_exercises} exercises`;

                renderModules(course.modules);

            } catch (error) {
                console.error('Load course error:', error);
            }
        }

        function renderModules(modules) {
            const list = document.getElementById('module-list');
            list.innerHTML = modules.map((mod, idx) => `
                <li class="module" id="module-${idx}">
                    <div class="module-header" onclick="toggleModule(${idx})">
                        <span class="module-title">${mod.title}</span>
                        <span class="module-level">${mod.competency_level}</span>
                    </div>
                    <div class="module-content">
                        ${mod.sections.map(sec => `
                            <div class="section">
                                <div class="section-title">
                                    ${sec.title}
                                    <span class="section-type ${sec.type}">${sec.type}</span>
                                </div>
                                <div class="section-body">${escapeHtml(sec.content).substring(0, 500)}${sec.content.length > 500 ? '...' : ''}</div>
                            </div>
                        `).join('')}
                    </div>
                </li>
            `).join('');
        }

        function toggleModule(idx) {
            const el = document.getElementById(`module-${idx}`);
            el.classList.toggle('expanded');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/courses`);
                const data = await response.json();

                const list = document.getElementById('history-list');
                if (!data.courses || data.courses.length === 0) {
                    list.innerHTML = '<li style="color: #8b949e; padding: 0.5rem;">No courses generated yet</li>';
                    return;
                }

                list.innerHTML = data.courses.slice(0, 5).map(course => `
                    <li class="history-item" onclick="loadCourse('${course.id}')">
                        <div class="history-item-title">${course.title || course.repo_name}</div>
                        <div class="history-item-meta">${course.repo_name} · ${new Date(course.created_at).toLocaleDateString()}</div>
                    </li>
                `).join('');

            } catch (error) {
                console.error('Load history error:', error);
            }
        }
    </script>
</body>
</html>
